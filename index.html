<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odalín RPG Tracker</title>
    <!-- Bootstrap 5 Dark Theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark text-light">
    <div class="app-shell">
        <aside class="sidebar-menu" aria-label="Menu principal">
            <div class="sidebar-section" role="tablist" aria-label="Navegacion">
                <button class="nav-link active" id="characters-tab" data-bs-toggle="tab" data-bs-target="#characters-pane" type="button" role="tab" title="Personajes">
                    <i class="fas fa-users"></i>
                </button>
                <button class="nav-link" id="inventory-tab" data-bs-toggle="tab" data-bs-target="#inventory-pane" type="button" role="tab" title="Inventario">
                    <i class="fas fa-box-open"></i>
                </button>
            </div>

            <div class="sidebar-section">
                <button id="addCharacterBtn" class="btn btn-outline-light btn-sm" title="Agregar personaje">
                    <i class="fas fa-user-plus"></i>
                </button>
                <button id="addItemBtn" class="btn btn-outline-light btn-sm" title="Agregar objeto">
                    <i class="fas fa-plus"></i>
                </button>
                <button id="restBtn" class="btn btn-outline-light btn-sm" title="Aplicar descanso">
                    <i class="fas fa-bed"></i>
                </button>
            </div>

            <div class="sidebar-section sidebar-bottom">
                <button id="exportBtn" class="btn btn-outline-light btn-sm" title="Exportar datos">
                    <i class="fas fa-download"></i>
                </button>
                <button id="importBtn" class="btn btn-outline-light btn-sm" title="Importar datos">
                    <i class="fas fa-upload"></i>
                </button>
            </div>
        </aside>

        <main class="app-content">
            <div class="tab-content">
                <div class="tab-pane fade show active" id="characters-pane" role="tabpanel">
                    <div class="row g-3" id="charactersContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="tab-pane fade" id="inventory-pane" role="tabpanel">
                    <div class="row g-3" id="inventoryContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Item Detail Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Objeto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Item photo -->
                    <div class="item-modal-photo-wrap">
                        <img id="itemModalPhoto" src="" alt="Foto" class="item-modal-photo img-fluid rounded">
                    </div>
                    <!-- Item details -->
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select id="itemModalType" class="form-select form-select-sm bg-secondary text-light border-secondary">
                            <option value="consumible">Consumible</option>
                            <option value="arma">Arma</option>
                            <option value="armadura">Armadura</option>
                            <option value="accesorio">Accesorio</option>
                        </select>
                    </div>
                    <div id="itemModalAssignment"></div>
                </div>
                <div class="modal-footer border-secondary">
                    <button id="itemModalRemoveBtn" class="btn btn-danger me-auto">
                        <i class="fas fa-trash"></i> Quitar
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- File inputs for import/export (hidden) -->
    <input type="file" id="fileImport" accept=".json" style="display: none;">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
